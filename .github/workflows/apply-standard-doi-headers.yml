name: Apply standard MKUFT DOI headers

on:
  push:
    paths:
      - '.github/workflows/apply-standard-doi-headers.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply standard DOI provenance headers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          DOI = "10.5281/zenodo.17780566"

          targets = [
              "README.md",
              "START_HERE_PUBLIC_OVERVIEW.md",
              "MKUFT_INTEGRATED_MASTER_SPINE.md",
              "SCIENCE_CONVERGENCE_AND_NOVELTY_MAP.md",
              "CANON_MAP.md",
              "docs/01_MKUFT_CORE_EXTENDED.md",
              "docs/02_MKUFT_MATH_APPENDIX.md",
              "docs/03_STANDALONE_FORMAL_ADDENDUM.md",
              "docs/04_EXPERIMENTAL_TEST_PROGRAM.md",
              "docs/05_FALSIFICATION_SUMMARY.md",
              "docs/06_OCQS_HUMAN_ACTIVATION_LAYER.md",
              "docs/07_ESRT_ESF_AND_VOYNICH_SUPPORT.md",
              "docs/08_LUCY_BOUNDARY_THRESHOLD_FRAMEWORK.md",
              "docs/09_VOYNICH_PROCEDURAL_ENGINE.md",
              "docs/10_ESRT_ESF_METHOD_APPENDIX.md",
              "docs/11_FULL_STACK_CONVERGENCE_PUBLIC_EXPLANATION.md",
              "docs/12_INDIVIDUAL_REALITY_COST_AND_COHESION.md",
              "docs/13_PHYSICS_FACING_MKUFT_EXPLANATION.md",
              "docs/14_WORKED_EXAMPLES_RNG_AND_ENVIRONMENT.md",
              "docs/15_PARADOXES_FREQUENCY_ATOMS_AND_SYMBOLIC_PHYSICS.md",
              "docs/16_GRADIENT_MECHANICS_BOUNDARY_SHEAR_GEOMETRY.md",
              "docs/17_MKUFT_DOLLARD_FIELD_GEOMETRY_NOTES.md",
              "docs/18_MKUFT_CLEAR_PUBLIC_EXPLANATION.md",
              "docs/19_MKUFT_RECONSTITUTION_KERNEL.md",
              "docs/20_GRACE_TRAVERSAL_RULE.md",
              "docs/21_AMBIGUITY_DYNAMICS_AND_MANOEUVRE_SPACE.md",
              "docs/22_CROSS_LAYER_INVARIANTS_AND_LAYER_ADDRESSING.md",
              "docs/23_AGENCY_ACCESSIBILITY_AND_CAPTURE_GEOMETRY.md",
              "docs/24_MKUFT_CROSS_SUPPORT_AND_TRAVERSAL_MAP.md",
              "docs/24A_ACTIVE_TRAVERSAL_AND_FUNCTIONAL_EMERGENCE_HYPOTHESIS.md",
              "docs/25_LOAD_BEARING_INVARIANTS_AND_WHOLE_SYSTEM_DEFORMATION.md",
          ]

          marker_start = "<!-- MKUFT-PROVENANCE-HEADER:START -->"
          marker_end = "<!-- MKUFT-PROVENANCE-HEADER:END -->"

          old_prefixes = (
              "author:", "**author:**",
              "framework:", "**framework:**",
              "project:", "**project:**",
              "primary doi:", "**primary doi:**",
              "backbone doi:", "**backbone doi:**",
              "mkuft doi:", "**mkuft doi:**",
              "provenance status:", "**provenance status:**",
              "provenance:", "**provenance:**",
              "citation and release coverage:", "**citation and release coverage:**",
              "citation:", "**citation:**",
              "publication track:", "**publication track:**",
          )

          def header_for(path: str) -> str:
              provenance_link = "PROVENANCE_DOI_AND_ATTRIBUTION.md" if "/" not in path else "../PROVENANCE_DOI_AND_ATTRIBUTION.md"
              return "\n".join([
                  marker_start,
                  "**Author:** Mark Charles McLaughlin  ",
                  "**Framework:** McLaughlin–Kairos Unified Field Theory (MKUFT)  ",
                  f"**MKUFT DOI:** `{DOI}`  ",
                  "**Provenance:** This module is part of the public MKUFT canon. Exact revisions are timestamped by Git history.  ",
                  f"**Citation:** See [`PROVENANCE_DOI_AND_ATTRIBUTION.md`]({provenance_link}).  ",
                  marker_end,
              ])

          def apply_header(path: str) -> bool:
              p = Path(path)
              if not p.exists():
                  print(f"skip missing: {path}")
                  return False

              text = p.read_text(encoding="utf-8")
              header = header_for(path)

              if marker_start in text and marker_end in text:
                  new = re.sub(
                      re.escape(marker_start) + r".*?" + re.escape(marker_end),
                      header,
                      text,
                      count=1,
                      flags=re.S,
                  )
              else:
                  lines = text.splitlines()
                  title_idx = next((i for i, line in enumerate(lines) if line.startswith("# ")), 0)
                  scan_end = min(len(lines), title_idx + 32)
                  cleaned = []
                  for i, line in enumerate(lines):
                      if title_idx < i < scan_end and line.strip().lower().startswith(old_prefixes):
                          continue
                      cleaned.append(line)
                  lines = cleaned
                  title_idx = next((i for i, line in enumerate(lines) if line.startswith("# ")), 0)
                  insertion = title_idx + 1
                  while insertion < len(lines) and lines[insertion] == "":
                      insertion += 1
                  lines[insertion:insertion] = ["", header, ""]
                  new = "\n".join(lines).rstrip() + "\n"

              if new != text:
                  p.write_text(new, encoding="utf-8")
                  print(f"updated: {path}")
                  return True
              return False

          for target in targets:
              apply_header(target)

          provenance = Path("PROVENANCE_DOI_AND_ATTRIBUTION.md")
          if provenance.exists():
              text = provenance.read_text(encoding="utf-8")
              start = "## Standard Module Provenance Header"
              replacement = f'''## Standard Module Provenance Header

Important canonical modules carry the same short provenance strip:

```text
Author: Mark Charles McLaughlin
Framework: McLaughlin–Kairos Unified Field Theory (MKUFT)
MKUFT DOI: {DOI}
Provenance: This module is part of the public MKUFT canon. Exact revisions are timestamped by Git history.
Citation: See PROVENANCE_DOI_AND_ATTRIBUTION.md.
```

The DOI is displayed directly on ordinary modules and standalone-paper candidates alike. Candidate status is recorded separately in `STANDALONE_PAPER_TRACK.md`; it is not presented in the module header as an absence of DOI coverage or as a pending-protection notice.

The DOI anchors each module to the published MKUFT body and author identity. Git history records the exact text and revision date of later working-canon material until it is included in a subsequent frozen Zenodo release.

## Standalone-Paper Track

Some modules may later become independently citable papers. Until a separate release is made, they remain canonical MKUFT modules, display the standard MKUFT DOI, and retain exact revision timestamps through Git history.

A later standalone DOI supplements the MKUFT DOI; it does not replace or obscure the originating framework or Mark Charles McLaughlin's authorship.

Current candidates and release criteria are recorded in `STANDALONE_PAPER_TRACK.md`.
'''
              if start in text:
                  text = text[:text.index(start)].rstrip() + "\n\n" + replacement
              else:
                  text = text.rstrip() + "\n\n" + replacement
              provenance.write_text(text.rstrip() + "\n", encoding="utf-8")

          standalone = Path("STANDALONE_PAPER_TRACK.md")
          standalone.write_text(f'''# MKUFT Standalone-Paper Track

**Author:** Mark Charles McLaughlin  
**Framework:** McLaughlin–Kairos Unified Field Theory (MKUFT)  
**MKUFT DOI:** `{DOI}`

## Purpose

This file records modules that may justify separate paper treatment later. It does not assign a new DOI prematurely and does not remove any module from the MKUFT canon.

Until separately released, each candidate remains:

- part of the public MKUFT working canon;
- attributable to Mark Charles McLaughlin;
- visibly linked to the MKUFT DOI;
- exactly timestamped at revision level by Git history.

## Primary standalone candidates

1. `docs/09_VOYNICH_PROCEDURAL_ENGINE.md` — applied procedural-structure hypothesis.
2. `docs/16_GRADIENT_MECHANICS_BOUNDARY_SHEAR_GEOMETRY.md` — physics-facing geometry and boundary hypothesis.
3. `docs/21_AMBIGUITY_DYNAMICS_AND_MANOEUVRE_SPACE.md` — formal ambiguity and manoeuvre-space model.
4. `docs/22_CROSS_LAYER_INVARIANTS_AND_LAYER_ADDRESSING.md` — layer-addressing and invariant-preservation method.
5. `docs/23_AGENCY_ACCESSIBILITY_AND_CAPTURE_GEOMETRY.md` — agency-access systems model.
6. `docs/24A_ACTIVE_TRAVERSAL_AND_FUNCTIONAL_EMERGENCE_HYPOTHESIS.md` — active traversal and matched-control functional emergence hypothesis.
7. `docs/25_LOAD_BEARING_INVARIANTS_AND_WHOLE_SYSTEM_DEFORMATION.md` — controlled deformation and whole-system coherence assay.

## Secondary review candidates

- `docs/06_OCQS_HUMAN_ACTIVATION_LAYER.md`
- `docs/10_ESRT_ESF_METHOD_APPENDIX.md`
- `docs/13_PHYSICS_FACING_MKUFT_EXPLANATION.md`

These require later review for novelty, evidence maturity, independent scope, and whether separate publication improves rather than fragments the MKUFT architecture.

## Header rule

Standalone-paper candidates carry the same visible MKUFT DOI header as the rest of the important canon. Their candidate status is recorded here rather than announced in the module header.

This keeps provenance strong and simple at the point of entry while preserving room for a later paper-specific title, abstract, citation block, licence statement, release date, and exact standalone DOI.

## Release rule

A candidate receives a separate DOI only when it has:

- a coherent standalone claim;
- its own abstract and literature boundary;
- explicit methods or test programme;
- independent falsifiers;
- enough content to be cited without requiring the reader to reconstruct the entire repository.

A separate DOI supplements the MKUFT DOI; it does not replace or obscure the originating framework and author attribution.
''', encoding="utf-8")

          readme = Path("README.md")
          if readme.exists():
              text = readme.read_text(encoding="utf-8")
              if "- `STANDALONE_PAPER_TRACK.md`" not in text and "- `RIGHTS_AND_LICENSE_NOTICE.md`" in text:
                  text = text.replace(
                      "- `RIGHTS_AND_LICENSE_NOTICE.md`",
                      "- `RIGHTS_AND_LICENSE_NOTICE.md`\n- `STANDALONE_PAPER_TRACK.md`",
                      1,
                  )
                  readme.write_text(text, encoding="utf-8")
          PY

      - name: Commit migration and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/apply-standard-doi-headers.yml
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git config user.name "MKUFT provenance migration"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply standard MKUFT DOI provenance headers"
          git push origin HEAD:main
